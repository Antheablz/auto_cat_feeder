<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cat Feeder Dashboard</title>
        <style>
            body {
                margin: 0;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .spinner {
                width: 200px;
                height: 200px;
                background-color: #3498db;
                color: red;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
                text-align: center;
                border-radius: 10px;

                animation: spin 2s linear infinite;
            }

            @keyframes spin {
                from {
                    transform: rotate(0deg);
                }
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
        <!-- <link rel="stylesheet" href="style.css"/> -->
        <!-- <link rel="stylesheet" href="media.css"/> -->
    </head>

    <body>
        <div class="spinner">TESTING TESTING</div>
    </body>

</html>
